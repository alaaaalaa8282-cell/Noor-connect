Summary: Privacy-focused Islamic app with prayer times, Qibla, and Quran
Description: |-
  Noor Connect is a comprehensive, beautiful, and privacy-first Islamic application designed to help you stay connected with your faith. Built with modern web technologies and optimized for mobile experiences, it serves as your digital companion for daily spiritual growth.

  Features include:
  • Complete Holy Quran with Tafsir Explorer (25+ commentary editions)
  • Accurate prayer times with Adhan notifications
  • High-precision Qibla compass
  • Quran Radio & E-books library
  • Ramadan mode with fasting tracker
  • Spiritual tracking (Tasbeeh, Salah chart, Qaza tracker)
  • Menstrual mode for women
  • Privacy-first design with 100% local storage
  • Multilingual support (English, Arabic, Urdu, Bengali, Russian, Kurdish)

  Privacy First Principle:
  Noor Connect strictly enforces Zero Analytics and Zero Trackers. All personal data, charts, and habits are stored purely on your local device. The code is entirely open-source, giving you absolute transparency and peace of mind.
