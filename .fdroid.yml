Builds:
  - versionName: 1.2.0
    versionCode: 4
    commit: v1.2.0
    subdir: android
    sudo:
      - apt-get update || true
      - apt-get install -y nodejs npm || true
    gradle:
      - yes
    gradleProps:
      - foss=true
    prebuild:
      - cd ..
      - sed -i 's/"@capacitor\/background-runner": "[^"]*",//' package.json
      - npm install
      - npm run build
      - npx cap sync android

MaintainerNotes: |
  Uses Capacitor. background-runner is removed to avoid prebuilt .so files.
  'foss' property disables play-services dependency.
  Build requires Node.js 18+ and npm.

