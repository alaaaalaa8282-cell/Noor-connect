configurations.all {
    // Exclude all Google Play Services for F-Droid compliance
    exclude group: 'com.google.android.gms', module: 'play-services-location'
    exclude group: 'com.google.android.gms', module: 'play-services-tasks'
    exclude group: 'com.google.android.gms', module: 'play-services-basement'
    exclude group: 'com.google.android.gms', module: 'play-services-analytics'
    exclude group: 'com.google.android.gms', module: 'play-services-gcm'
    exclude group: 'com.google.android.gms', module: 'play-services-base'
    exclude group: 'com.google.android.gms', module: 'play-services-cloud-messaging'
    exclude group: 'com.google.android.gms', module: 'play-services-auth'
    exclude group: 'com.google.android.gms', module: 'play-services-auth-api-phone'
    exclude group: 'com.google.android.gms', module: 'play-services-maps'
    exclude group: 'com.google.android.gms', module: 'play-services-ads'
    exclude group: 'com.google.android.gms', module: 'play-services-ads-identifier'
}
