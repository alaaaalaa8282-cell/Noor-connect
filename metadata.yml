Summary: Your Ultimate Islamic Companion
Description: |-
    Noor Connect is a comprehensive, beautiful, and privacy-focused Islamic application designed to help you stay connected with your faith. Built with modern web technologies and optimized for mobile experiences via Capacitor, it serves as your digital companion for daily spiritual growth.
    Features:
    * Complete Holy Quran with Tafsir Explorer (25+ commentary editions)
    * Accurate prayer times with Adhan notifications
    * High-precision Qibla compass
    * Quran Radio & E-books library
    * Ramadan mode with fasting tracker
    * Spiritual tracking (Tasbeeh, Salah chart, Qaza tracker)
    * Menstrual mode for women
    * Privacy-first design with 100% local storage
    * Multilingual support (English, Arabic, Urdu, Bengali, Russian, Kurdish)

AntiFeatures:
  NonFreeNet:
    en-US: Connects to third-party web services for Islamic content
      including prayer times (aladhan.com), Quran text (alquran.cloud),
      audio recitations (quranicaudio.com), radio stations, and live
      streaming. No tracking or analytics SDKs present.

